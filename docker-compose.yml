services:
  camunda7:
    image: camunda/camunda-bpm-platform:latest
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Kolkata

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    depends_on:
      - camunda7
      - mongo
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/flows
      - CAMUNDA_BASE_URL=http://camunda7:8080
      - CORS_ORIGIN=http://localhost:3000
      - ALLOWED_TOPICS=checkInventory,sendEmail,httpRequest
      - JWT_SECRET=dev-secret
    ports:
      - "4000:4000"

  workers:
    build:
      context: ./workers
    depends_on:
      - camunda7
    environment:
      - CAMUNDA_BASE_URL=http://camunda7:8080
      - PORT=4001
    ports:
      - "4001:4001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    environment:
      - PORT=3000
    ports:
      - "3000:3000"

volumes:
  mongo_data:
